<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			// Set data-theme before first paint so the palette never flashes.
			// Reads localStorage; absent value falls through to the CSS auto
			// path (prefers-color-scheme). Wrapped in try/catch because a
			// restricted-storage context (Safari private, blocked cookies)
			// must still boot without throwing.
			(function () {
				try {
					var t = localStorage.getItem('tabula-theme');
					if (t === 'light' || t === 'dark') {
						document.documentElement.dataset.theme = t;
					}
				} catch (_) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
